name: Build Turnip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      TERM: xterm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List files in repo
        run: |
          echo "===== FILES IN REPO ====="
          ls -la
          echo ""
          echo "===== FILES IN scripts/ ====="
          ls -la scripts/ 2>/dev/null || echo "scripts/ directory not found"
          echo ""
          echo "===== CHECKING FOR SCRIPT ====="
          if [ -f "scripts/build-turnip.sh" ]; then
            echo "✅ Found scripts/build-turnip.sh"
          elif [ -f "build-turnip.sh" ]; then
            echo "✅ Found build-turnip.sh"
          elif [ -f "scripts/VanezZa.sh" ]; then
            echo "✅ Found scripts/VanezZa.sh"
          elif [ -f "VanezZa.sh" ]; then
            echo "✅ Found VanezZa.sh"
          else
            echo "❌ No build script found!"
            echo "Searching for .sh files..."
            find . -name "*.sh" -type f 2>/dev/null || echo "No .sh files found anywhere"
            exit 1
          fi

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            llvm \
            lld \
            cmake \
            ninja-build \
            pkg-config \
            patchelf \
            python3 \
            python3-pip \
            python3-venv \
            python3-mako \
            python-is-python3 \
            flex \
            bison \
            glslang-tools \
            vulkan-tools \
            unzip \
            zip \
            wget \
            curl \
            git \
            ccache

      - name: Install Latest Meson
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "meson>=1.5.0"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Environment Info
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "===== SYSTEM ====="
          uname -a
          echo ""
          echo "===== MESON ====="
          which meson || echo "meson not found in PATH"
          meson --version || echo "meson version check failed"
          echo ""
          echo "===== CLANG ====="
          clang --version
          echo ""
          echo "===== NINJA ====="
          ninja --version
          echo ""
          echo "===== NDK will be downloaded during build ====="

      - name: Make build script executable
        run: |
          if [ -f "scripts/build-turnip.sh" ]; then
            chmod +x scripts/build-turnip.sh
            echo "✅ Made scripts/build-turnip.sh executable"
          elif [ -f "build-turnip.sh" ]; then
            chmod +x build-turnip.sh
            echo "✅ Made build-turnip.sh executable"
          elif [ -f "scripts/VanezZa.sh" ]; then
            chmod +x scripts/VanezZa.sh
            echo "✅ Made scripts/VanezZa.sh executable"
          elif [ -f "VanezZa.sh" ]; then
            chmod +x VanezZa.sh
            echo "✅ Made VanezZa.sh executable"
          else
            echo "❌ No build script found!"
            exit 1
          fi

      - name: Run Build Script
        run: |
          export TERM=xterm
          export PATH="$HOME/.local/bin:$PATH"
          echo "Current directory: $(pwd)"
          echo ""
          
          if [ -f "scripts/build-turnip.sh" ]; then
            echo "Running scripts/build-turnip.sh..."
            cd scripts && ./build-turnip.sh
          elif [ -f "build-turnip.sh" ]; then
            echo "Running build-turnip.sh..."
            ./build-turnip.sh
          elif [ -f "scripts/VanezZa.sh" ]; then
            echo "Running scripts/VanezZa.sh..."
            cd scripts && ./VanezZa.sh
          elif [ -f "VanezZa.sh" ]; then
            echo "Running VanezZa.sh..."
            ./VanezZa.sh
          else
            echo "❌ No build script found!"
            exit 1
          fi

      - name: Show Output Files
        if: always()
        run: |
          echo "========================================="
          echo "===== GENERATED FILES ====="
          echo "========================================="
          echo ""
          echo "--- Current directory ---"
          pwd
          ls -la
          echo ""
          echo "--- scripts/ directory ---"
          ls -la scripts/ 2>/dev/null || echo "scripts/ not found"
          echo ""
          echo "--- ZIP files ---"
          find . -name "*.zip" -type f 2>/dev/null || echo "No zip files found"
          echo ""
          echo "--- SO files ---"
          find . -name "*.so" -type f 2>/dev/null || echo "No so files found"
          echo ""
          echo "--- Workdir contents ---"
          ls -la turnip_workdir/ 2>/dev/null || echo "turnip_workdir not found"
          echo ""
          echo "--- Build log ---"
          if [ -f "build.log" ]; then
            echo "===== BUILD LOG START ====="
            cat build.log
            echo "===== BUILD LOG END ====="
          elif [ -f "scripts/build.log" ]; then
            echo "===== BUILD LOG START (from scripts/) ====="
            cat scripts/build.log
            echo "===== BUILD LOG END ====="
          else
            echo "build.log not found"
          fi

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs-Complete
          path: |
            build.log
            scripts/build.log
            **/meson_log
            **/meson-log.txt
            **/ninja_log
            **/*.log
          if-no-files-found: warn

      - name: Upload Turnip Driver
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: turnip-25.1.0-R1-EMULATOR
          path: |
            turnip_workdir/turnip-*.zip
            scripts/turnip_workdir/turnip-*.zip
          if-no-files-found: warn
