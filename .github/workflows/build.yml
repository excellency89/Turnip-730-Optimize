name: Build Turnip - Adreno 730 Optimized

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      TERM: xterm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List files in repo
        run: |
          echo "===== FILES IN REPO ====="
          ls -la
          echo ""
          echo "===== FILES IN scripts/ ====="
          ls -la scripts/ 2>/dev/null || echo "scripts/ directory not found"
          echo ""
          echo "===== CHECKING FOR SCRIPT ====="
          if [ -f "scripts/build-turnip.sh" ]; then
            echo "✅ Found scripts/build-turnip.sh"
          elif [ -f "build-turnip.sh" ]; then
            echo "✅ Found build-turnip.sh"
          else
            echo "❌ No build script found!"
            find . -name "*.sh" -type f 2>/dev/null || echo "No .sh files found"
            exit 1
          fi

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            llvm \
            lld \
            cmake \
            ninja-build \
            pkg-config \
            patchelf \
            python3 \
            python3-pip \
            python3-venv \
            python3-mako \
            python-is-python3 \
            flex \
            bison \
            vulkan-tools \
            unzip \
            zip \
            wget \
            curl \
            git \
            ccache

      - name: Install glslang-tools
        run: |
          sudo apt install -y glslang-tools || sudo apt install -y glslang-dev
          which glslangValidator || echo "glslangValidator not found"
          glslangValidator --version 2>/dev/null || echo "glslangValidator version check failed"

      - name: Install Latest Meson
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "meson>=1.5.0"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Environment Info
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "===== SYSTEM ====="
          uname -a
          echo ""
          echo "===== MESON ====="
          which meson || echo "meson not found in PATH"
          meson --version || echo "meson version check failed"
          echo ""
          echo "===== CLANG ====="
          clang --version
          echo ""
          echo "===== NINJA ====="
          ninja --version
          echo ""
          echo "===== GLSLANG ====="
          which glslangValidator || echo "glslangValidator not found"
          glslangValidator --version 2>/dev/null || echo "glslangValidator version check failed"
          echo ""
          echo "===== Adreno 730 Build Mode ====="
          echo "🔧 Optimizations: -O3 -march=armv8.2a+fp16 -mcpu=cortex-x2 -ffast-math -funroll-loops"
          echo "📦 Disabled: GL, EGL, GBM, X11, Wayland, LLVM"

      - name: Make build script executable
        run: |
          if [ -f "scripts/build-turnip.sh" ]; then
            chmod +x scripts/build-turnip.sh
            echo "✅ Made scripts/build-turnip.sh executable"
          elif [ -f "build-turnip.sh" ]; then
            chmod +x build-turnip.sh
            echo "✅ Made build-turnip.sh executable"
          else
            echo "❌ No build script found!"
            exit 1
          fi

      - name: Run Build Script
        run: |
          export TERM=xterm
          export PATH="$HOME/.local/bin:$PATH"
          echo "Current directory: $(pwd)"
          echo ""
          echo "🔥 Building Adreno 730 Optimized Driver..."
          echo ""
          
          if [ -f "scripts/build-turnip.sh" ]; then
            cd scripts && ./build-turnip.sh
          elif [ -f "build-turnip.sh" ]; then
            ./build-turnip.sh
          else
            echo "❌ No build script found!"
            exit 1
          fi

      - name: Show Output Files
        if: always()
        run: |
          echo "========================================="
          echo "===== GENERATED FILES ====="
          echo "========================================="
          echo ""
          echo "--- ZIP files ---"
          find . -name "*.zip" -type f 2>/dev/null || echo "No zip files found"
          echo ""
          echo "--- SO files ---"
          find . -name "*.so" -type f 2>/dev/null || echo "No so files found"
          echo ""
          echo "--- Workdir contents ---"
          ls -la turnip_workdir/ 2>/dev/null || echo "turnip_workdir not found"
          ls -la scripts/turnip_workdir/ 2>/dev/null || echo "scripts/turnip_workdir not found"
          echo ""
          echo "--- Build log ---"
          if [ -f "build.log" ]; then
            tail -100 build.log
          elif [ -f "scripts/build.log" ]; then
            tail -100 scripts/build.log
          else
            echo "build.log not found"
          fi

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs-Complete
          path: |
            build.log
            scripts/build.log
            **/meson_log
            **/meson-log.txt
            **/ninja_log
            **/*.log
          if-no-files-found: warn

      - name: Upload Turnip Driver (Adreno 730 Optimized)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: turnip-25.1.0-R1-Adreno730-Optimized
          path: |
            turnip_workdir/turnip-*.zip
            scripts/turnip_workdir/turnip-*.zip
          if-no-files-found: warn
